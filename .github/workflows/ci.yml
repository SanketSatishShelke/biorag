name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: biorag
          POSTGRES_PASSWORD: biorag_dev_password
          POSTGRES_DB: biorag
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: biorag
      POSTGRES_PASSWORD: biorag_dev_password
      POSTGRES_DB: biorag
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      EMBEDDING_MODEL: NeuML/pubmedbert-base-embeddings
      APP_ENV: test
      DATA_ROOT: /tmp/biorag

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Enable pgvector extension
        run: psql -h localhost -U biorag -d biorag -c "CREATE EXTENSION IF NOT EXISTS vector;"
        env:
          PGPASSWORD: biorag_dev_password

      - name: Set up test data directory
        run: mkdir -p /tmp/biorag/raw/tests

      - name: Download test PDF from PubMed Central
        run: |
          wget -q -O /tmp/biorag/raw/test_paper.pdf \
            "https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8157143/pdf/41467_2021_Article_23347.pdf"
          ls -lh /tmp/biorag/raw/tests/test_paper.pdf

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --cov=ingestion --cov-report=term-missing

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v