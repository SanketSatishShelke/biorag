services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: biorag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biorag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biorag_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-biorag}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
